output:
  - meta
  - summary
  - success
  - failure
  - execution_out
  - skips

pre-commit:
  piped: true
  jobs:
    - name: lint
      run: pnpm oxlint --fix --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: fmt
      run: pnpm oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: verify
      group:
        parallel: true
        jobs:
          - name: build
            run: pnpm -r --reporter=append-only build
          - name: test
            run: pnpm test

prepare-commit-msg:
  commands:
    prepare:
      run: bun ./scripts/prepare-commit-msg.ts {1}
