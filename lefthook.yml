pre-commit:
  commands:
    fmt:
      run: pnpm oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    lint:
      run: pnpm oxlint --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    test:
      run: pnpm test
    build:
      run: pnpm build

prepare-commit-msg:
  commands:
    prepare:
      run: bun ./scripts/prepare-commit-msg {1}
